<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OSIX</title>
    <link rel="stylesheet" href="/osix/static/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
    <script src="/osix/static/app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">OSIX</p>
          <h1>Статистика війни та економіки</h1>
        </div>
        <div class="toolbar">
          <select id="dataset">
            <option value="general_losses">General losses</option>
            <option value="russia_oil_exports">Russian oil exports</option>
            <option value="sbs_stats">SBS</option>
          </select>
          <div class="metric-picker">
            <button id="metricPickerToggle" class="secondary-button" type="button" aria-expanded="false">
              Показники <span id="metricCount">1</span>
            </button>
            <div id="metricMenu" class="metric-menu" hidden></div>
          </div>
          <label class="normalize-control">
            <input id="normalize" type="checkbox" />
            Індекс 100
          </label>
          <select id="period">
            <option value="all">Весь час</option>
            <option value="year">Рік</option>
            <option value="3m">3 місяці</option>
            <option value="month" selected>Місяць</option>
            <option value="week">Тиждень</option>
            <option value="custom">Період</option>
          </select>
          <input id="start" type="date" />
          <input id="end" type="date" />
          <button id="refresh" type="button">Оновити</button>
        </div>
      </header>

      <p id="datasetNote" class="dataset-note"></p>

      <section class="summary" id="summary"></section>

      <section class="grid">
        <article class="panel chart-panel">
          <h2>Динаміка показників</h2>
          <div class="chart-box">
            <canvas id="totalChart"></canvas>
          </div>
        </article>
        <article class="panel chart-panel">
          <h2>Добова зміна</h2>
          <div class="chart-box">
            <canvas id="deltaChart"></canvas>
          </div>
        </article>
        <article class="panel chart-panel">
          <h2>Останні значення</h2>
          <div class="chart-box">
            <canvas id="comparisonChart"></canvas>
          </div>
        </article>
        <article class="panel">
          <h2>Source health</h2>
          <div id="health" class="table"></div>
        </article>
        <article class="panel">
          <h2>Parser errors</h2>
          <div id="errors" class="table"></div>
        </article>
      </section>

      <section class="panel admin">
        <h2>Admin</h2>
        <form id="loginForm" class="login">
          <input name="username" autocomplete="username" placeholder="Username" />
          <input name="password" type="password" autocomplete="current-password" placeholder="Password" />
          <button type="submit">Login</button>
          <button id="reingest" type="button">Reingest</button>
          <button id="backfillMod" type="button">Backfill MOD</button>
        </form>
        <p id="adminStatus" class="muted"></p>
        <div id="sourceConfig" class="source-config"></div>
      </section>
    </main>
  </body>
</html>
