<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09141e" />
    <title>Shieldline offline</title>
    <style>
      :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #07111a; color: #f4f8fb; }
      body { min-height: 100vh; display: grid; place-items: center; margin: 0; padding: 24px; background: radial-gradient(circle at top, #123047, #07111a 62%); }
      main { width: min(440px, 100%); padding: 28px; border: 1px solid rgba(115, 228, 255, .22); border-radius: 20px; background: rgba(10, 20, 31, .86); box-shadow: 0 30px 80px rgba(0, 0, 0, .4); }
      span { color: #55d7ff; font-size: 12px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
      h1 { margin: 10px 0 8px; font-size: 32px; }
      p { color: #b9c7d2; line-height: 1.55; }
      button { min-height: 44px; width: 100%; margin-top: 12px; border: 1px solid rgba(115, 228, 255, .3); border-radius: 12px; color: #eefaff; background: #12384d; font: inherit; font-weight: 750; }
    </style>
  </head>
  <body>
    <main>
      <span>Shieldline · offline</span>
      <h1>Командний центр недоступний</h1>
      <p>Локальний план збережено. Training, Sandbox і Rapid Response можна продовжити після повторного відкриття, а серверні команди синхронізуються після відновлення мережі.</p>
      <button type="button" onclick="location.reload()">Спробувати ще раз</button>
    </main>
  </body>
</html>
