<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070808" />
    <link rel="icon" href="/shieldline/shieldline-mark.svg" type="image/svg+xml" />
    <title>Shieldline offline</title>
    <style>
      :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #070808; color: #f4f1e7; }
      body { min-height: 100vh; display: grid; place-items: center; margin: 0; padding: 24px; background: radial-gradient(circle at top, #1a1b16, #070808 62%); }
      main { width: min(440px, 100%); padding: 28px; border: 1px solid rgba(246, 197, 71, .22); border-radius: 20px; background: rgba(13, 14, 13, .9); box-shadow: 0 30px 80px rgba(0, 0, 0, .4); }
      .brand { display: flex; align-items: center; gap: 9px; color: #f6c547; font-size: 12px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
      .brand img { width: 30px; height: 30px; }
      h1 { margin: 10px 0 8px; font-size: 32px; }
      p { color: #b9c7d2; line-height: 1.55; }
      button { min-height: 44px; width: 100%; margin-top: 12px; border: 1px solid rgba(246, 197, 71, .3); border-radius: 12px; color: #f4f1e7; background: rgba(246, 197, 71, .1); font: inherit; font-weight: 750; }
    </style>
  </head>
  <body>
    <main>
      <span class="brand"><img src="/shieldline/shieldline-mark.svg" alt="" />ShieldLine · offline</span>
      <h1>Командний центр недоступний</h1>
      <p>Локальний план збережено. Training, Sandbox і Rapid Response можна продовжити після повторного відкриття, а серверні команди синхронізуються після відновлення мережі.</p>
      <button type="button" onclick="location.reload()">Спробувати ще раз</button>
    </main>
  </body>
</html>
