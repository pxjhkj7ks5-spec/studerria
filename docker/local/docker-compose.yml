name: kma-local

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-student_portal}
      POSTGRES_USER: ${POSTGRES_USER:-studerria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studerria_local}
    ports:
      - "${POSTGRES_PORT_FORWARD:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 120s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "${REDIS_PORT_FORWARD:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  loki:
    image: grafana/loki:3.1.1
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "${LOKI_PORT_FORWARD:-3100}:3100"
    volumes:
      - ./logging/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ready >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  promtail:
    image: grafana/promtail:3.1.1
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./logging/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp

  charredmap:
    build:
      context: ../../services/charredmap
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: /charredmap
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: ${CHARREDMAP_NODE_ENV:-development}
      HOSTNAME: 0.0.0.0
      PORT: 8080
      NEXT_PUBLIC_BASE_PATH: /charredmap
      DATABASE_URL: file:/data/charredmap.db
      UPLOAD_DIR: /data/uploads
      OCCUPATION_OVERLAY_FILE: ${CHARREDMAP_OVERLAY_FILE:-/data/occupied-territories-editorial.geojson}
      ADMIN_PATH: ${CHARREDMAP_ADMIN_PATH:-admin}
      ADMIN_PASSWORD: ${CHARREDMAP_ADMIN_PASSWORD:-change-me-charredmap-admin}
      SESSION_SECRET: ${CHARREDMAP_SESSION_SECRET:-change-me-charredmap-session-secret-change-this}
    volumes:
      - charredmap_data:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/charredmap').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  naradadruk:
    build:
      context: ../../services/naradadruk
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: /naradadruk
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: ${NARADADRUK_NODE_ENV:-development}
      HOSTNAME: 0.0.0.0
      PORT: 8080
      NEXT_PUBLIC_BASE_PATH: /naradadruk
      DATABASE_URL: file:/data/naradadruk.db
      UPLOAD_DIR: /data/uploads
      ADMIN_PATH: ${NARADADRUK_ADMIN_PATH:-admin}
      ADMIN_PASSWORD: ${NARADADRUK_ADMIN_PASSWORD:-change-me-naradadruk-admin}
      SESSION_SECRET: ${NARADADRUK_SESSION_SECRET:-change-me-naradadruk-session-secret-change-this}
      TELEGRAM_CHANNEL_URL: ${NARADADRUK_TELEGRAM_CHANNEL_URL:-https://web.telegram.org/k/#@naradaprint}
    volumes:
      - naradadruk_data:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/naradadruk').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  app:
    build:
      context: ../..
      dockerfile: docker/local/Dockerfile
    init: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${APP_PORT:-3000}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-studerria}
      DB_PASS: ${POSTGRES_PASSWORD:-studerria_local}
      DB_NAME: ${POSTGRES_DB:-student_portal}
      DB_SSL: "false"
      SESSION_STORE_DRIVER: ${SESSION_STORE_DRIVER:-redis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SESSION_REDIS_PREFIX: ${SESSION_REDIS_PREFIX:-kma:sess:}
      REDIS_CONNECT_TIMEOUT_MS: ${REDIS_CONNECT_TIMEOUT_MS:-5000}
      REDIS_KEEPALIVE_MS: ${REDIS_KEEPALIVE_MS:-30000}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-local-session-secret}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:-}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      CHARREDMAP_PROXY_TARGET: http://charredmap:8080
      NARADADRUK_PROXY_TARGET: http://naradadruk:8080
    ports:
      - "${APP_PORT_FORWARD:-3000}:${APP_PORT:-3000}"
    volumes:
      - ../../uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || '3000') + '/__version').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  charredmap_data:
  naradadruk_data:
  loki_data:
  promtail_positions:
