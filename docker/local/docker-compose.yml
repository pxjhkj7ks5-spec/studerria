name: kma-local

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-student_portal}
      POSTGRES_USER: ${POSTGRES_USER:-studerria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studerria_local}
    ports:
      - "${POSTGRES_PORT_FORWARD:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 120s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "${REDIS_PORT_FORWARD:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${OSIX_CLICKHOUSE_DATABASE:-osix}
      CLICKHOUSE_USER: ${OSIX_CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${OSIX_CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "${OSIX_CLICKHOUSE_PORT_FORWARD:-8123}:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --host 127.0.0.1 --user \"$${CLICKHOUSE_USER}\" --password \"$${CLICKHOUSE_PASSWORD}\" --query 'SELECT 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  loki:
    image: grafana/loki:3.1.1
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "${LOKI_PORT_FORWARD:-3100}:3100"
    volumes:
      - ./logging/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ready >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  promtail:
    image: grafana/promtail:3.1.1
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./logging/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp

  charredmap:
    build:
      context: ../../services/charredmap
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: /charredmap
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: ${CHARREDMAP_NODE_ENV:-development}
      HOSTNAME: 0.0.0.0
      PORT: 8080
      NEXT_PUBLIC_BASE_PATH: /charredmap
      DATABASE_URL: file:/data/charredmap.db
      UPLOAD_DIR: /data/uploads
      OCCUPATION_OVERLAY_FILE: ${CHARREDMAP_OVERLAY_FILE:-/data/occupied-territories-editorial.geojson}
      ADMIN_PATH: ${CHARREDMAP_ADMIN_PATH:-admin}
      ADMIN_PASSWORD: ${CHARREDMAP_ADMIN_PASSWORD:-change-me-charredmap-admin}
      SESSION_SECRET: ${CHARREDMAP_SESSION_SECRET:-change-me-charredmap-session-secret-change-this}
    volumes:
      - charredmap_data:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/charredmap').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  china-map:
    build:
      context: ../../services/china-map
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: /china-map
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: ${CHINAMAP_NODE_ENV:-development}
      HOSTNAME: 0.0.0.0
      PORT: 8080
      NEXT_PUBLIC_BASE_PATH: /china-map
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/china-map').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  naradadruk:
    image: ${NARADADRUK_IMAGE:-ghcr.io/pxjhkj7ks5-spec/studerria-naradadruk:latest}
    build:
      context: ../../services/naradadruk
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: /naradadruk
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: ${NARADADRUK_NODE_ENV:-development}
      HOSTNAME: 0.0.0.0
      PORT: 8080
      NEXT_PUBLIC_BASE_PATH: /naradadruk
      DATABASE_URL: file:/data/naradadruk.db
      UPLOAD_DIR: /data/uploads
      ADMIN_PATH: ${NARADADRUK_ADMIN_PATH:-admin}
      ADMIN_PASSWORD: ${NARADADRUK_ADMIN_PASSWORD:-change-me-naradadruk-admin}
      SESSION_SECRET: ${NARADADRUK_SESSION_SECRET:-change-me-naradadruk-session-secret-change-this}
      TELEGRAM_CHANNEL_URL: ${NARADADRUK_TELEGRAM_CHANNEL_URL:-https://web.telegram.org/k/#@naradaprint}
    volumes:
      - naradadruk_data:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/naradadruk').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  slashtg:
    image: ${SLASHTG_IMAGE:-ghcr.io/pxjhkj7ks5-spec/studerria-slashtg:latest}
    build:
      context: ../../services/slashtg
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: /tg
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: ${SLASHTG_NODE_ENV:-development}
      HOSTNAME: 0.0.0.0
      PORT: 8080
      NEXT_PUBLIC_BASE_PATH: /tg
      DATABASE_URL: file:/data/slashtg.db
      SLASHTG_BOT_TOKEN: ${SLASHTG_BOT_TOKEN:-}
      SLASHTG_SESSION_SECRET: ${SLASHTG_SESSION_SECRET:-change-me-slashtg-session-secret-change-this}
      SLASHTG_USER_A_TELEGRAM_ID: ${SLASHTG_USER_A_TELEGRAM_ID:-}
      SLASHTG_USER_B_TELEGRAM_ID: ${SLASHTG_USER_B_TELEGRAM_ID:-}
      SLASHTG_USER_A_LABEL: ${SLASHTG_USER_A_LABEL:-Person A}
      SLASHTG_USER_B_LABEL: ${SLASHTG_USER_B_LABEL:-Person B}
      SLASHTG_INIT_DATA_MAX_AGE_SECONDS: ${SLASHTG_INIT_DATA_MAX_AGE_SECONDS:-86400}
      SLASHTG_DEV_TELEGRAM_USER_ID: ${SLASHTG_DEV_TELEGRAM_USER_ID:-}
    volumes:
      - slashtg_data:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/tg').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  withlforl:
    build:
      context: ../../services/withlforl
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: /withlforl
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: ${WITHLFORL_NODE_ENV:-development}
      HOSTNAME: 0.0.0.0
      PORT: 8080
      NEXT_PUBLIC_BASE_PATH: /withlforl
      WITHLFORL_PASSWORD: ${WITHLFORL_PASSWORD:-change-me-withlforl-password}
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/withlforl').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  osix:
    build:
      context: ../../services/osix
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      OSIX_BASE_PATH: /osix
      OSIX_PUBLIC_URL: ${OSIX_PUBLIC_URL:-https://studerria.com/osix}
      OSIX_CLICKHOUSE_HOST: clickhouse
      OSIX_CLICKHOUSE_PORT: 8123
      OSIX_CLICKHOUSE_USER: ${OSIX_CLICKHOUSE_USER:-default}
      OSIX_CLICKHOUSE_PASSWORD: ${OSIX_CLICKHOUSE_PASSWORD:-}
      OSIX_CLICKHOUSE_DATABASE: ${OSIX_CLICKHOUSE_DATABASE:-osix}
      OSIX_RAW_SNAPSHOT_DIR: /data/raw-snapshots
      OSIX_RAW_RETENTION_DAYS: ${OSIX_RAW_RETENTION_DAYS:-90}
      OSIX_POLL_INTERVAL_SECONDS: ${OSIX_POLL_INTERVAL_SECONDS:-3600}
      OSIX_REQUEST_TIMEOUT_SECONDS: ${OSIX_REQUEST_TIMEOUT_SECONDS:-20}
      OSIX_ADMIN_USERNAME: ${OSIX_ADMIN_USERNAME:-}
      OSIX_ADMIN_PASSWORD_HASH: ${OSIX_ADMIN_PASSWORD_HASH:-}
      OSIX_JWT_SECRET: ${OSIX_JWT_SECRET:-}
      OSIX_ADMIN_COOKIE_SECURE: ${OSIX_ADMIN_COOKIE_SECURE:-true}
      OSIX_ADMIN_SESSION_TTL_SECONDS: ${OSIX_ADMIN_SESSION_TTL_SECONDS:-28800}
      OSIX_SOURCE_GENERAL_URL: ${OSIX_SOURCE_GENERAL_URL:-https://www.zsu.gov.ua/oriientovni-vtraty-protyvnyka}
      OSIX_SOURCE_MOD_LISTING_URL: ${OSIX_SOURCE_MOD_LISTING_URL:-https://mod.gov.ua/news/tag-vidsich-agresoru}
      OSIX_SOURCE_MOD_ARTICLE_PREFIX: ${OSIX_SOURCE_MOD_ARTICLE_PREFIX:-https://mod.gov.ua/news/bojovi-vtrati-voroga-na-}
      OSIX_SOURCE_SBS_URL: ${OSIX_SOURCE_SBS_URL:-https://sbs-group.army/}
    volumes:
      - osix_raw_snapshots:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/osix/api/v1/health/live', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  app:
    build:
      context: ../..
      dockerfile: docker/local/Dockerfile
    init: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${APP_PORT:-3000}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-studerria}
      DB_PASS: ${POSTGRES_PASSWORD:-studerria_local}
      DB_NAME: ${POSTGRES_DB:-student_portal}
      DB_SSL: "false"
      SESSION_STORE_DRIVER: ${SESSION_STORE_DRIVER:-redis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SESSION_REDIS_PREFIX: ${SESSION_REDIS_PREFIX:-kma:sess:}
      REDIS_CONNECT_TIMEOUT_MS: ${REDIS_CONNECT_TIMEOUT_MS:-5000}
      REDIS_KEEPALIVE_MS: ${REDIS_KEEPALIVE_MS:-30000}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-local-session-secret}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:-}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      STUDERRIA_PUBLIC_URL: ${STUDERRIA_PUBLIC_URL:-https://studerria.com}
      CHARREDMAP_PROXY_TARGET: http://charredmap:8080
      CHINAMAP_PROXY_TARGET: http://china-map:8080
      NARADADRUK_PROXY_TARGET: http://naradadruk:8080
      SLASHTG_PROXY_TARGET: http://slashtg:8080
      SLASHTG_BASE_PATH: ${SLASHTG_BASE_PATH:-/tg}
      WITHLFORL_PROXY_TARGET: http://withlforl:8080
      OSIX_PROXY_TARGET: http://osix:8080
      STUDERRIA_TG_BOT_TOKEN: ${STUDERRIA_TG_BOT_TOKEN:-}
      STUDERRIA_TG_BOT_USERNAME: ${STUDERRIA_TG_BOT_USERNAME:-}
      STUDERRIA_TG_APP_SHORT_NAME: ${STUDERRIA_TG_APP_SHORT_NAME:-}
      STUDERRIA_TG_MINI_APP_DEEP_LINK: ${STUDERRIA_TG_MINI_APP_DEEP_LINK:-}
      STUDERRIA_TG_MINI_APP_URL: ${STUDERRIA_TG_MINI_APP_URL:-}
      STUDERRIA_TG_USE_WEB_APP_BUTTON: ${STUDERRIA_TG_USE_WEB_APP_BUTTON:-true}
      STUDERRIA_TG_BOT_POLLING_ENABLED: ${STUDERRIA_TG_BOT_POLLING_ENABLED:-true}
      STUDERRIA_TG_BOT_DROP_PENDING_UPDATES: ${STUDERRIA_TG_BOT_DROP_PENDING_UPDATES:-true}
      STUDERRIA_TG_INIT_DATA_MAX_AGE_SECONDS: ${STUDERRIA_TG_INIT_DATA_MAX_AGE_SECONDS:-86400}
      STUDERRIA_TG_DEV_TELEGRAM_ID: ${STUDERRIA_TG_DEV_TELEGRAM_ID:-}
      STUDERRIA_TG_DEV_GREETING_ENABLED: ${STUDERRIA_TG_DEV_GREETING_ENABLED:-false}
      STUDERRIA_TG_DEV_GREETING_TARGET_CHAT_ID: ${STUDERRIA_TG_DEV_GREETING_TARGET_CHAT_ID:-}
      STUDERRIA_TG_DEV_GREETING_TARGET_THREAD_ID: ${STUDERRIA_TG_DEV_GREETING_TARGET_THREAD_ID:-}
      STUDERRIA_TG_DEV_PHOTO_CLEANER_ENABLED: ${STUDERRIA_TG_DEV_PHOTO_CLEANER_ENABLED:-false}
      STUDERRIA_TG_DEV_PHOTO_CLEANER_CHAT_IDS: ${STUDERRIA_TG_DEV_PHOTO_CLEANER_CHAT_IDS:-}
      STUDERRIA_TG_DEV_PHOTO_CLEANER_MAX_BYTES: ${STUDERRIA_TG_DEV_PHOTO_CLEANER_MAX_BYTES:-20971520}
      STUDERRIA_TG_MEETING_AUDIO_FILE: ${STUDERRIA_TG_MEETING_AUDIO_FILE:-/app/uploads/good-morning-vietnam.mp3}
    ports:
      - "${APP_PORT_FORWARD:-3000}:${APP_PORT:-3000}"
    volumes:
      - ../../uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || '3000') + '/__version').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  charredmap_data:
  naradadruk_data:
  slashtg_data:
  osix_raw_snapshots:
  clickhouse_data:
  loki_data:
  promtail_positions:
