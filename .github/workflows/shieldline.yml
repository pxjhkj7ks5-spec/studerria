name: Shieldline

on:
  push:
    paths:
      - "services/shieldline/**"
      - "docker/local/docker-compose.yml"
      - "scripts/server-update.sh"
      - ".github/workflows/shieldline.yml"
  pull_request:
    paths:
      - "services/shieldline/**"
      - "docker/local/docker-compose.yml"
      - "scripts/server-update.sh"
      - ".github/workflows/shieldline.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/shieldline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/shieldline/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Build production image
        working-directory: .
        run: docker build -t shieldline-ci services/shieldline
